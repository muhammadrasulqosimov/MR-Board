<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR BOARD · PART 18 · ENTERPRISE</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ========== ENTERPRISE ULTIMATE CSS O'ZGARUVCHILARI (1:1) ========== */
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --bg-hover: rgba(0,0,0,0.05);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.1);
            --brand-primary: #007aff;
            --state-danger: #ff3b30;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.8);
            --dur: 3.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-canvas);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-container {
            width: 96vw; height: 92vh;
            background: var(--bg-canvas);
            border-radius: 32px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            border: 6px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .grid-pattern { 
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        /* TOOLTIP (Sizning kodingizdan 1:1) */
        .tooltip {
            position: absolute;
            bottom: calc(100% + 16px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--text-main);
            color: var(--bg-canvas);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 10px;
            opacity: 0;
            transition: all 0.3s var(--ease-spring);
            white-space: nowrap;
            pointer-events: none;
        }
        .tooltip::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); border: 6px solid transparent;
            border-top-color: var(--text-main);
        }
        .action-btn.show-tip .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* EXIT MODAL SIMULATION (Sizning Confirm mantiqingiz uslubida) */
        .exit-confirm {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            padding: 32px;
            border-radius: 32px;
            width: 380px;
            text-align: center;
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border-subtle);
            opacity: 0;
            z-index: 300;
            transition: all 0.5s var(--ease-spring);
        }
        .exit-confirm.is-visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* MAGIC CURSOR */
        .magic-cursor {
            position: absolute; top: 0; left: 0; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            z-index: 1000; pointer-events: none; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            animation: moveCursor18 var(--dur) var(--ease-smooth) forwards;
        }

        @keyframes moveCursor18 {
            0% { transform: translate(1250px, 785px); } /* 17-qism oxiri */
            30% { transform: translate(1300px, 785px); } /* Exit tugmasiga borish */
            35% { transform: translate(1300px, 785px) scale(0.8); } /* CLICK */
            40% { transform: translate(1300px, 785px) scale(1); }
            60% { transform: translate(750px, 530px); } /* "Ha" tugmasi ustiga */
            70% { transform: translate(750px, 530px) scale(0.8); } /* CLICK */
            100% { transform: translate(750px, 530px); }
        }

        /* DOCK */
        .dock-bottom { position: absolute; bottom: 32px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .dock-glass { background: var(--bg-glass); backdrop-filter: blur(50px); border: 1px solid var(--border-subtle); border-radius: 32px; padding: 12px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-float); }
        
        .action-btn { width: 56px; height: 56px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); position: relative; }

        .progress { position: absolute; bottom: 0; left: 0; height: 6px; background: var(--brand-primary); width: 85%; animation: fill var(--dur) linear forwards; }
        @keyframes fill { from { width: 85%; } to { width: 90%; } }
    </style>
</head>
<body data-theme="light">

    <div class="video-container grid-pattern">
        <div class="progress"></div>

        <div class="exit-confirm" id="exit-ui">
            <i data-lucide="log-out" size="48" style="color: var(--state-danger); margin-bottom: 16px;"></i>
            <h2 style="font-weight: 800; margin-bottom: 8px;">Xonadan chiqish</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px; font-weight: 600;">Haqiqatdan ham loyihani yopmoqchimisiz?</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button style="padding: 14px 28px; border-radius: 16px; border: 1.5px solid var(--border-strong); background: var(--bg-base); font-weight: 700;">Yo'q</button>
                <button id="btn-confirm-exit" style="padding: 14px 28px; border-radius: 16px; border: none; background: var(--state-danger); color: #fff; font-weight: 700; box-shadow: 0 8px 16px rgba(255,59,48,0.2);">Ha, chiqish</button>
            </div>
        </div>

        <div class="magic-cursor"></div>

        <div class="dock-bottom">
            <div class="dock-glass">
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="settings-2"></i></div>
                <div style="width:1px;height:32px;background:rgba(0,0,0,0.1);margin:0 8px;"></div>
                <div style="flex: 1; display: flex; gap: 8px; opacity: 0.3;">
                    <div class="action-btn"><i data-lucide="pencil"></i></div>
                    <div class="action-btn"><i data-lucide="shapes"></i></div>
                </div>
                <div style="width:1px;height:32px;background:rgba(0,0,0,0.1);margin:0 8px;"></div>
                <div class="action-btn" id="dock-exit">
                    <i data-lucide="log-out" style="color: var(--state-danger)"></i>
                    <div class="tooltip" id="exit-tip">Chiqish</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const dockExit = document.getElementById('dock-exit');
        const exitTip = document.getElementById('exit-tip');
        const exitUi = document.getElementById('exit-ui');
        const confirmBtn = document.getElementById('btn-confirm-exit');

        // 1. Tooltip ko'rsatish
        setTimeout(() => {
            dockExit.classList.add('show-tip');
        }, 800);

        // 2. Click va Modal ochilishi
        setTimeout(() => {
            dockExit.style.background = "rgba(255, 59, 48, 0.1)";
            exitUi.classList.add('is-visible');
        }, 1300);

        // 3. Confirm (Tasdiqlash)
        setTimeout(() => {
            confirmBtn.style.transform = "scale(0.92)";
        }, 2600);

        // 4. Finalga o'tish (Part 19)
        setTimeout(() => {
            window.location.href = 'part19.html';
        }, 3500);
    </script>
</body>
</html>
