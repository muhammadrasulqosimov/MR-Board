<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR BOARD · PART 12 · ENTERPRISE</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ========== ENTERPRISE ULTIMATE CSS O'ZGARUVCHILARI (1:1) ========== */
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.1);
            --brand-primary: #007aff;
            --brand-alpha: rgba(0,122,255,0.15);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15), 0 12px 24px -8px rgba(0,0,0,0.1);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.8), inset 0 0 0 1px rgba(255,255,255,0.4);
            --dur: 3.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-canvas);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-container {
            width: 96vw; height: 92vh;
            background: var(--bg-canvas);
            border-radius: 32px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            border: 6px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .grid-pattern { 
            background-color: var(--bg-canvas);
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        /* TEXT OBJECT ON CANVAS */
        .text-object {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: 32px;
            font-weight: 800;
            color: var(--brand-primary);
            white-space: nowrap;
            user-select: none;
            opacity: 0;
            animation: textPopIn 0.6s var(--ease-spring) 0.4s forwards;
        }

        @keyframes textPopIn {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* SELECTION BOX (Sizning kodingizdagi tanlash ramkasi stili) */
        .selection-frame {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--brand-primary);
            border-radius: 8px;
            background: var(--brand-alpha);
            pointer-events: none;
        }

        /* HANDLE DOTS */
        .handle {
            position: absolute;
            width: 12px; height: 12px;
            background: #fff;
            border: 2px solid var(--brand-primary);
            border-radius: 50%;
        }
        .nw { top: -6px; left: -6px; }
        .ne { top: -6px; right: -6px; }
        .sw { bottom: -6px; left: -6px; }
        .se { bottom: -6px; right: -6px; }

        /* MAGIC CURSOR ANIMATION */
        .magic-cursor {
            position: absolute;
            top: 0; left: 0; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            z-index: 1000; pointer-events: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            animation: moveCursor12 var(--dur) var(--ease-smooth) forwards;
        }

        @keyframes moveCursor12 {
            0% { transform: translate(1000px, 500px); } /* 11-qism oxiri */
            20% { transform: translate(650px, 450px); } /* Matn ustiga keladi */
            40% { transform: translate(840px, 515px); } /* Pastki o'ng burchakdagi nuqtaga (resize) */
            50% { transform: translate(840px, 515px) scale(0.8); } /* CLICK */
            70% { transform: translate(900px, 560px); } /* Kattalashtirish (Drag) */
            85% { transform: translate(150px, 150px); } /* Yuqoriga chiqib ketish */
            100% { transform: translate(-100px, 100px); }
        }

        /* DOCK (Sizning kodingizdan 1:1) */
        .dock-bottom {
            position: absolute; bottom: 32px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100;
        }
        .dock-glass {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 12px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: var(--shadow-float), var(--shadow-glass);
        }
        .action-btn {
            width: 56px; height: 56px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); transition: 0.3s;
        }
        .action-btn.is-active { background: var(--brand-primary); color: #fff; }

        /* PROGRESS BAR */
        .progress { position: absolute; bottom: 0; left: 0; height: 6px; background: var(--brand-primary); width: 55%; animation: fill var(--dur) linear forwards; }
        @keyframes fill { from { width: 55%; } to { width: 60%; } }
    </style>
</head>
<body>

    <div class="video-container grid-pattern">
        <div class="progress"></div>

        <div class="text-object" id="text-obj">
            MR BOARD Enterprise - Ishni boshlaymiz!
            <div class="selection-frame">
                <div class="handle nw"></div>
                <div class="handle ne"></div>
                <div class="handle sw"></div>
                <div class="handle se"></div>
            </div>
        </div>

        <div class="magic-cursor"></div>

        <div class="dock-bottom">
            <div class="dock-glass">
                <div class="action-btn"><i data-lucide="settings-2"></i></div>
                <div class="action-btn"><div style="width:32px;height:32px;border-radius:50%;background:#007aff;border:3px solid #fff;"></div></div>
                <div style="width:1px;height:32px;background:rgba(0,0,0,0.1);margin:0 8px;"></div>
                <div class="action-btn"><i data-lucide="pencil"></i></div>
                <div class="action-btn"><i data-lucide="wand-2"></i></div>
                <div class="action-btn"><i data-lucide="shapes"></i></div>
                <div class="action-btn"><i data-lucide="eraser"></i></div>
                <div class="action-btn"><i data-lucide="hand"></i></div>
                <div class="action-btn is-active"><i data-lucide="type"></i></div>
                <div class="action-btn"><i data-lucide="undo-2"></i></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const textObj = document.getElementById('text-obj');

        // Kattalashtirish (Resize) effekti simulyatsiyasi
        setTimeout(() => {
            textObj.style.transition = "all 0.8s cubic-bezier(0.25, 1, 0.5, 1)";
            textObj.style.fontSize = "42px";
        }, 2100);

        // Keyingi sahifaga o'tish
        setTimeout(() => {
            window.location.href = 'part13.html';
        }, 3600);
    </script>
</body>
</html>
