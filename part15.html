<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR BOARD · PART 15 · ENTERPRISE</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ========== ENTERPRISE ULTIMATE CSS O'ZGARUVCHILARI (1:1) ========== */
        :root {
            --bg-base: #f8fafc;
            --bg-canvas: #e2e8f0;
            --bg-glass: rgba(255,255,255,0.65);
            --bg-panel: rgba(255,255,255,0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-subtle: rgba(255,255,255,0.4);
            --border-strong: rgba(0,0,0,0.1);
            --brand-primary: #007aff;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.25, 1, 0.5, 1);
            --shadow-float: 0 24px 48px -12px rgba(0,0,0,0.15);
            --shadow-glass: inset 0 1px 1px rgba(255,255,255,0.8);
            --dur: 3.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif;
            background: var(--bg-canvas);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-container {
            width: 96vw; height: 92vh;
            background: var(--bg-canvas);
            border-radius: 32px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
            border: 6px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .grid-pattern { 
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        /* DRAWER COLORS (Sizning kodingizdan 1:1) */
        .drawer {
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: 400px;
            background: var(--bg-panel);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border-subtle);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.6s var(--ease-spring);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-float);
        }
        .drawer.is-open { transform: translateX(0); }

        .drawer-header {
            padding: 32px;
            border-bottom: 1px solid var(--border-strong);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-content { padding: 32px; flex: 1; overflow-y: auto; }

        /* COLOR WHEEL SIMULATION */
        .color-wheel {
            width: 280px; height: 280px;
            border-radius: 50%;
            margin: 0 auto 32px;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
            border: 8px solid var(--bg-base);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            position: relative;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }
        .swatch {
            width: 100%; aspect-ratio: 1;
            border-radius: 12px;
            border: 2px solid rgba(0,0,0,0.1);
        }

        /* MAGIC CURSOR ANIMATION */
        .magic-cursor {
            position: absolute;
            top: 0; left: 0; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            z-index: 1000; pointer-events: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            animation: moveCursor15 var(--dur) var(--ease-smooth) forwards;
        }

        @keyframes moveCursor15 {
            0% { transform: translate(1200px, 300px); }
            20% { transform: translate(180px, 785px); } /* Dock'dagi Rang tanlash (Color Indicator) */
            25% { transform: translate(180px, 785px) scale(0.8); } /* CLICK */
            30% { transform: translate(180px, 785px) scale(1); }
            50% { transform: translate(250px, 600px); } /* Palitradagi yashil rang ustiga */
            55% { transform: translate(250px, 600px) scale(0.8); } /* CLICK */
            75% { transform: translate(600px, 500px); } /* Markazdagi shaklga qarash */
            100% { transform: translate(1000px, 100px); }
        }

        /* DOCK (1:1) */
        .dock-bottom {
            position: absolute; bottom: 32px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100;
        }
        .dock-glass {
            background: var(--bg-glass);
            backdrop-filter: blur(50px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 12px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: var(--shadow-float);
        }

        .progress { position: absolute; bottom: 0; left: 0; height: 6px; background: var(--brand-primary); width: 70%; animation: fill var(--dur) linear forwards; }
        @keyframes fill { from { width: 70%; } to { width: 75%; } }
    </style>
</head>
<body data-theme="light">

    <div class="video-container grid-pattern">
        <div class="progress"></div>

        <div class="drawer" id="drawer-colors">
            <div class="drawer-header">
                <h2 style="font-weight: 800; font-size: 24px;">Rang palitrasi</h2>
                <i data-lucide="x" style="color: var(--text-muted);"></i>
            </div>
            <div class="drawer-content">
                <div class="color-wheel"></div>
                <div class="palette-grid">
                    <div class="swatch" style="background: #ff3b30;"></div>
                    <div class="swatch" style="background: #ff9500;"></div>
                    <div class="swatch" style="background: #ffcc00;"></div>
                    <div class="swatch" id="target-swatch" style="background: #34c759;"></div>
                    <div class="swatch" style="background: #007aff;"></div>
                </div>
            </div>
        </div>

        <div id="main-rect" style="position: absolute; top: 55%; left: 50%; width: 400px; height: 200px; border: 4px solid var(--brand-primary); background: var(--brand-alpha); border-radius: 12px; transform: translate(-50%, -50%); transition: 0.5s;"></div>

        <div class="magic-cursor"></div>

        <div class="dock-bottom">
            <div class="dock-glass">
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="settings-2"></i></div>
                <div id="dock-color-btn" style="width:32px;height:32px;border-radius:50%;background:#007aff;border:3px solid #fff;margin: 0 10px; transition: 0.3s;"></div>
                <div style="width:1px;height:32px;background:rgba(0,0,0,0.1);margin:0 8px;"></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="pencil"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="wand-2"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="shapes"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="eraser"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="hand"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="type"></i></div>
                <div style="width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#64748b;"><i data-lucide="undo-2"></i></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const drawer = document.getElementById('drawer-colors');
        const rect = document.getElementById('main-rect');
        const dockColor = document.getElementById('dock-color-btn');
        const targetSwatch = document.getElementById('target-swatch');

        // 1. Drawer ochilishi
        setTimeout(() => {
            drawer.classList.add('is-open');
        }, 850);

        // 2. Rang o'zgarishi
        setTimeout(() => {
            targetSwatch.style.transform = "scale(1.2)";
            rect.style.borderColor = "#34c759";
            rect.style.background = "rgba(52, 199, 89, 0.15)";
            dockColor.style.background = "#34c759";
        }, 2000);

        // 3. Drawer yopilishi va keyingi sahifa
        setTimeout(() => {
            drawer.classList.remove('is-open');
        }, 2800);

        setTimeout(() => {
            window.location.href = 'part16.html';
        }, 3600);
    </script>
</body>
</html>
